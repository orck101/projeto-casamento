<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex, nofollow">
  <title>Painel — Victor & Luana</title>
  <style>
    :root {
      --ink: #1a1f3d;
      --bg: #f4efe5;
      --card: #ffffff;
      --accent: #1b7a72;
      --accent-dark: #145d57;
      --danger: #c0392b;
      --border: rgba(26, 31, 61, 0.12);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: 'Segoe UI', Arial, sans-serif;
      background: var(--bg);
      color: var(--ink);
      min-height: 100vh;
    }
    .wrap { max-width: 760px; margin: 0 auto; padding: 2.5rem 1.25rem 4rem; }
    h1 { font-size: 1.6rem; margin-bottom: .25rem; }
    .subtitle { color: rgba(26,31,61,.6); margin-bottom: 2rem; }

    /* Tela de login */
    #login-view { max-width: 360px; margin: 4rem auto 0; text-align: center; }
    #login-view h1 { text-align: center; }
    .field { text-align: left; margin-bottom: 1rem; }
    label { display: block; font-size: .85rem; margin-bottom: .35rem; color: rgba(26,31,61,.7); }
    input {
      width: 100%; padding: .7rem .85rem; border-radius: 10px;
      border: 1px solid var(--border); font-size: 1rem;
    }
    button {
      cursor: pointer; border: none; border-radius: 10px;
      font-size: .95rem; font-weight: 600; padding: .7rem 1.1rem;
    }
    .btn-primary { background: var(--accent); color: #fff; width: 100%; margin-top: .5rem; }
    .btn-primary:hover { background: var(--accent-dark); }
    .btn-primary:disabled { opacity: .6; cursor: default; }
    #login-error { color: var(--danger); font-size: .85rem; margin-top: .75rem; min-height: 1.2em; }

    /* Topo do painel */
    .topbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem; }
    .logout-btn { background: transparent; border: 1px solid var(--border); color: var(--ink); }
    .summary {
      background: var(--card); border-radius: 14px; padding: 1.25rem 1.5rem;
      margin-bottom: 1.75rem; display: flex; gap: 2rem; flex-wrap: wrap;
    }
    .summary div strong { display: block; font-size: 1.4rem; }
    .summary div span { font-size: .8rem; color: rgba(26,31,61,.6); }

    /* Cards de presente */
    .gift-row {
      background: var(--card); border-radius: 14px; padding: 1.25rem 1.5rem;
      margin-bottom: 1rem; border: 1px solid var(--border);
    }
    .gift-row h3 { margin: 0 0 .25rem; font-size: 1.05rem; }
    .gift-values { font-size: .9rem; color: rgba(26,31,61,.7); margin-bottom: .6rem; }
    .progress-track { height: 8px; border-radius: 99px; background: #eee; overflow: hidden; margin-bottom: 1rem; }
    .progress-fill { height: 100%; background: var(--accent); border-radius: 99px; transition: width .3s ease; }
    .adjust-row { display: flex; gap: .6rem; align-items: center; flex-wrap: wrap; }
    .adjust-row input {
      width: 120px; padding: .55rem .7rem;
    }
    .btn-add { background: var(--accent); color: #fff; }
    .btn-subtract { background: #fff; color: var(--danger); border: 1px solid var(--danger); }
    .btn-add:hover { background: var(--accent-dark); }
    .btn-subtract:hover { background: #fdecea; }
    .row-feedback { font-size: .8rem; margin-left: auto; min-height: 1.2em; }
    .row-feedback.ok { color: var(--accent); }
    .row-feedback.error { color: var(--danger); }

    #panel-view { display: none; }
    .empty { color: rgba(26,31,61,.5); padding: 2rem 0; text-align: center; }

    .section-divider { height: 1px; background: var(--border); margin: 2.5rem 0 1.75rem; }
    h2 { font-size: 1.3rem; margin: 0 0 .25rem; }

    /* Lista de RSVP */
    .rsvp-row {
      background: var(--card); border-radius: 14px; padding: 1rem 1.25rem;
      margin-bottom: .6rem; border: 1px solid var(--border); cursor: pointer;
    }
    .rsvp-row-head { display: flex; align-items: center; justify-content: space-between; gap: .75rem; flex-wrap: wrap; }
    .rsvp-name { font-weight: 600; }
    .rsvp-meta { font-size: .82rem; color: rgba(26,31,61,.6); margin-top: .2rem; }
    .badge {
      font-size: .75rem; font-weight: 600; padding: .2rem .6rem; border-radius: 99px;
      white-space: nowrap;
    }
    .badge-yes { background: #e6f4f1; color: var(--accent-dark); }
    .badge-no { background: #fdecea; color: var(--danger); }
    .rsvp-details {
      display: none; margin-top: .85rem; padding-top: .85rem;
      border-top: 1px dashed var(--border); font-size: .9rem; line-height: 1.6;
    }
    .rsvp-details.open { display: block; }
    .rsvp-details p { margin: 0 0 .4rem; }
    .rsvp-details strong { display: inline-block; min-width: 130px; }
  </style>
</head>
<body>
  <div class="wrap">

    <div id="login-view">
      <h1>Painel privado</h1>
      <p class="subtitle">Acesso restrito a Victor &amp; Luana</p>
      <form id="login-form">
        <div class="field">
          <label for="email">E-mail</label>
          <input id="email" type="email" autocomplete="username" required>
        </div>
        <div class="field">
          <label for="password">Senha</label>
          <input id="password" type="password" autocomplete="current-password" required>
        </div>
        <button type="submit" class="btn-primary" id="login-button">Entrar</button>
        <p id="login-error"></p>
      </form>
    </div>

    <div id="panel-view">
      <div class="topbar">
        <div>
          <h1>Painel de presentes</h1>
          <p class="subtitle">Ajuste os valores conforme os Pix forem caindo</p>
        </div>
        <button class="logout-btn" id="logout-button">Sair</button>
      </div>

      <div class="summary" id="summary"></div>

      <div id="gift-list"></div>

      <div class="section-divider"></div>

      <div class="topbar">
        <div>
          <h2>Confirmações de presença</h2>
          <p class="subtitle">Clique em uma pessoa para ver quem ela levou</p>
        </div>
        <button class="logout-btn" id="export-names-button">Baixar lista de nomes</button>
      </div>

      <div class="summary" id="rsvp-summary"></div>

      <div id="rsvp-list"></div>
    </div>

  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="config.js"></script>
  <script src="admin.js"></script>
</body>
</html>
